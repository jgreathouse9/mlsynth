# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the version of Python and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: docs/conf.py
  # Enable once the build is warning-free (currently ~700 "duplicate object
  # description" warnings remain from autodoc re-exports, plus undefined
  # citations). Turning this on before then will fail the RTD build.
  # fail_on_warning: true

# Install dependencies listed in docs/requirements.txt
python:
  install:
    - requirements: docs/requirements.txt
