name: Test mlsynth Installation

# Post-merge install smoke check only. It installs mlsynth from the GitHub `main`
# branch and imports it, so it is only meaningful AFTER a merge to main -- on a PR
# it would install main (not the PR's code) and tell us nothing. The PR gate is
# the full test suite in build.yml.
on:
  push:
    branches:
      - main  # validate that main pip-installs + imports after each merge
  workflow_dispatch:

jobs:
  install_and_test:
    runs-on: ubuntu-latest  # Use an Ubuntu runner

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2  # Checkout your code

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'  # Use the desired Python version

    - name: Install mlsynth from GitHub
      run: |
        pip install git+https://github.com/jgreathouse9/mlsynth.git  # Install from GitHub

    - name: Verify mlsynth installation
      run: |
        python -c "import mlsynth; print('mlsynth installed and working!')"  # Test import
