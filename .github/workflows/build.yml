name: Test MLSYNTH

# The full test suite runs ONCE per change -- on the pull request only (the gate).
# It does NOT run on push: [main], so a merge never re-tests the identical tree.
# The coverage badge is updated out-of-band by the daily `coverage-badge.yml`
# workflow, so this gate never commits to / de-heads a PR.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_target:
        description: "Enter 'all', 'smoke', or a test file (e.g. test_lexscm.py)"
        required: false
        default: "all"

permissions:
  contents: read
  pull-requests: read     # dorny/paths-filter reads the PR's changed files

# Cancel superseded runs on the same ref instead of piling up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PYTHONWARNINGS: "ignore"
  MPLBACKEND: "Agg"          # headless matplotlib, belt-and-suspenders

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25     # a hung suite shouldn't burn a full-length runner slot
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Decide whether this change can affect the test suite. Docs-only and
      # benchmarks-only PRs skip the (slow) run -- the job still completes, so a
      # required "build" check stays satisfiable. Workflow_dispatch always runs.
      - name: Detect code changes
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'mlsynth/**'
              - 'requirements.txt'
              - 'pyproject.toml'
              - '.github/workflows/build.yml'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip          # cache pip downloads -> faster installs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist coverage

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      # A failing test FAILS the job (no continue-on-error). Parallel via -n auto.
      # Runs on dispatch always; on a PR only when code (not just docs/benchmarks)
      # changed. Coverage is produced out-of-band by coverage-badge.yml, so the
      # gate runs pass/fail only -- no --cov overhead here.
      - name: Run tests
        if: github.event_name != 'pull_request' || steps.filter.outputs.code == 'true'
        run: |
          # PRs run the full suite; dispatch honors the input target.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.test_target }}"
          else
            TARGET="all"
          fi
          echo "Test target: $TARGET"

          if [ "$TARGET" = "smoke" ]; then
            pytest -n auto -k "smoke" --tb=short
          elif [ "$TARGET" = "all" ]; then
            pytest -n auto --tb=short
          else
            MATCH=$(find . -name "$TARGET" | head -n 1)
            if [ -z "$MATCH" ]; then
              echo "ERROR: Could not find test file: $TARGET"; find . -name "test_*.py"; exit 1
            fi
            pytest -n auto "$MATCH" --tb=short
          fi

      - name: Build distribution
        run: |
          python -m pip install build
          python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlsynth-dist
          path: dist/

  # Cross-version coverage: the `build` job above runs the suite on 3.11 (and
  # is the required gate); this job exercises the rest of the supported range so
  # the `requires-python` floor and the Python classifiers in pyproject.toml are
  # backed by an actual test run, not just an assertion. 3.11 is omitted here to
  # avoid duplicating `build`. 3.9 is handled separately (see `py39-smoke`).
  pyversions:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect code changes
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'mlsynth/**'
              - 'requirements.txt'
              - 'pyproject.toml'
              - '.github/workflows/build.yml'

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        if: github.event_name != 'pull_request' || steps.filter.outputs.code == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-xdist

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Run tests
        if: github.event_name != 'pull_request' || steps.filter.outputs.code == 'true'
        run: pytest -n auto --tb=short

  # Python 3.9 is supported (it is the `requires-python` floor) but gets a fast
  # smoke job rather than the full suite. Reason: 3.9's newest scipy is 1.13,
  # whose regressed `nnls` is unusable on the MSCMT big-M solve, so MSCMT falls
  # back to the in-house pure-NumPy NNLS -- correct, but far too slow for the
  # differential-evolution tests to fit a CI budget. This job proves 3.9 imports
  # (the union-annotation fix) and that the in-house solver and a representative
  # set of non-DE estimators pass; the DE-heavy suite is covered on 3.10-3.13
  # (fast scipy) and validated locally on 3.9.
  py39-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect code changes
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'mlsynth/**'
              - 'requirements.txt'
              - 'pyproject.toml'
              - '.github/workflows/build.yml'

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install dependencies
        if: github.event_name != 'pull_request' || steps.filter.outputs.code == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-xdist

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Import + in-house NNLS + representative estimators
        if: github.event_name != 'pull_request' || steps.filter.outputs.code == 'true'
        run: |
          python -c "import mlsynth; print('import mlsynth OK on 3.9')"
          pytest -n auto --tb=short \
            mlsynth/tests/test_bilevel_nnls.py \
            mlsynth/tests/test_sbc.py \
            mlsynth/tests/test_fdid.py \
            mlsynth/tests/test_mcnnm.py \
            mlsynth/tests/test_clustersc.py \
            mlsynth/tests/test_ctsc.py
