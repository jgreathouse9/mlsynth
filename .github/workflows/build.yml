name: Build and Test MLSYNTH

on:
  push:
    branches: [main]
    paths-ignore:
      - "coverage.svg"

  pull_request:
    branches: [main]

  workflow_dispatch:
    inputs:
      test_target:
        description: "Enter 'all' or a test file (e.g. test_lexscm.py)"
        required: false
        default: "smoke"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ----------------------------
    # CHECKOUT
    # ----------------------------
    - uses: actions/checkout@v4

    # ----------------------------
    # PYTHON
    # ----------------------------
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # ----------------------------
    # INSTALL
    # ----------------------------
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov coverage coverage-badge

    # ----------------------------
    # PYTHONPATH
    # ----------------------------
    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

    # ----------------------------
    # DEBUG (optional but useful)
    # ----------------------------
    - name: Show repo structure
      run: ls -R

    # ----------------------------
    # RUN TESTS (SMART LOGIC)
    # ----------------------------
    - name: Run tests
      run: |
        TARGET="${{ github.event.inputs.test_target }}"

        echo "Test target: $TARGET"

        # ------------------------
        # CASE 1: PUSH / PR (no input)
        # ------------------------
        if [ -z "$TARGET" ]; then
          echo "No target specified → running smoke tests"
          pytest -k "smoke" --tb=short || echo "No smoke tests found"
          exit 0
        fi

        # ------------------------
        # CASE 2: ALL TESTS
        # ------------------------
        if [ "$TARGET" = "all" ]; then
          echo "Running FULL test suite"
          pytest -x --cov=mlsynth --cov-report=xml --tb=short
          exit 0
        fi

        # ------------------------
        # CASE 3: SPECIFIC TEST
        # ------------------------
        echo "Searching for test file: $TARGET"

        MATCH=$(find . -name "$TARGET" | head -n 1)

        if [ -z "$MATCH" ]; then
          echo "ERROR: Could not find test file: $TARGET"
          echo "Available tests:"
          find . -name "test_*.py"
          exit 1
        fi

        echo "Running: $MATCH"
        pytest -x "$MATCH" --tb=short

    # ----------------------------
    # COVERAGE (ONLY FOR FULL RUN)
    # ----------------------------
    - name: Coverage report
      if: ${{ github.event.inputs.test_target == 'all' }}
      run: |
        coverage report -m
        coverage xml
        coverage-badge -o coverage.svg -f

    # ----------------------------
    # COMMIT BADGE
    # ----------------------------
    - name: Commit coverage badge
      if: ${{ github.event.inputs.test_target == 'all' }}
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add coverage.svg
        git commit -m "Update coverage badge" || echo "No changes"
        git push

    # ----------------------------
    # BUILD DIST
    # ----------------------------
    - name: Build distribution
      run: python setup.py sdist

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mlsynth-dist
        path: dist/
