name: Test MLSYNTH

on:
  push:
    branches: [main]
    paths-ignore:
      - "coverage.svg"

  pull_request:
    branches: [main]

  workflow_dispatch:
    inputs:
      test_target:
        description: "Enter 'all' or a test file (e.g. test_lexscm.py)"
        required: false
        default: "smoke"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ----------------------------
    # CHECKOUT
    # ----------------------------
    - name: Checkout code
      uses: actions/checkout@v4

    # ----------------------------
    # PYTHON SETUP
    # ----------------------------
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # ----------------------------
    # FORCE UNBUFFERED OUTPUT
    # ----------------------------
    - name: Force unbuffered Python
      run: echo "PYTHONUNBUFFERED=1" >> $GITHUB_ENV

    # ----------------------------
    # INSTALL DEPENDENCIES
    # ----------------------------
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov coverage coverage-badge

    # ----------------------------
    # SET PYTHONPATH
    # ----------------------------
    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

    # ----------------------------
    # SUPPRESS WARNINGS
    # ----------------------------
    - name: Suppress warnings
      run: echo "PYTHONWARNINGS=ignore" >> $GITHUB_ENV

    # ----------------------------
    # RUN TESTS
    # ----------------------------
    - name: Run tests
      continue-on-error: true
      run: |
        TARGET="${{ github.event.inputs.test_target }}"

        echo "Test target: $TARGET"

        # ------------------------
        # CASE 1: PUSH / PR
        # ------------------------
        if [ -z "$TARGET" ]; then
          echo "No target specified → running smoke tests"
          pytest --maxfail=0 -k "smoke" --tb=short -s
          exit 0
        fi

        # ------------------------
        # CASE 2: ALL TESTS
        # ------------------------
        if [ "$TARGET" = "all" ]; then
          echo "Running FULL test suite"
          pytest --maxfail=0 \
                 --cov=mlsynth \
                 --cov-report=xml \
                 --tb=short \
                 -s
          exit 0
        fi

        # ------------------------
        # CASE 3: SPECIFIC TEST
        # ------------------------
        echo "Searching for test file: $TARGET"

        MATCH=$(find . -name "$TARGET" | head -n 1)

        if [ -z "$MATCH" ]; then
          echo "ERROR: Could not find test file: $TARGET"
          echo "Available tests:"
          find . -name "test_*.py"
          exit 1
        fi

        echo "Running: $MATCH"

        pytest --maxfail=0 "$MATCH" --tb=short -s

    # ----------------------------
    # COVERAGE REPORT
    # ----------------------------
    - name: Coverage report
      if: ${{ github.event.inputs.test_target == 'all' }}
      run: |
        coverage report -m
        coverage xml
        coverage-badge -o coverage.svg -f

    # ----------------------------
    # COMMIT COVERAGE BADGE
    # ----------------------------
    - name: Commit coverage badge
      if: ${{ github.event.inputs.test_target == 'all' }}
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"

        git add coverage.svg

        git commit -m "Update coverage badge" || echo "No changes"

        git push

    # ----------------------------
    # BUILD DISTRIBUTION
    # ----------------------------
    - name: Build distribution
      run: python setup.py sdist

    # ----------------------------
    # UPLOAD ARTIFACT
    # ----------------------------
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mlsynth-dist
        path: dist/
