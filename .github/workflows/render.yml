name: Render Private Book

on:
  push:
    branches: [book]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install TinyTeX
        run: quarto install tinytex --no-prompt

      - name: Render Quarto book (HTML + PDF)
        run: quarto render

      # Copy the rendered PDF out of the gitignored _book/ and commit it to the
      # branch so it is viewable directly in the repo. Pushed with GITHUB_TOKEN,
      # which does not re-trigger this workflow (no render loop).
      - name: Commit book.pdf to the branch
        if: success()
        run: |
          pdf="$(ls _book/*.pdf | head -1)"
          echo "Rendered PDF: $pdf"
          cp "$pdf" book.pdf
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f book.pdf
          if git diff --cached --quiet; then
            echo "book.pdf unchanged; nothing to commit."
          else
            git commit -m "Auto-build book.pdf [skip ci]"
            git push origin HEAD:book
          fi

      # Also publish the full render (PDF + HTML site) as a downloadable artifact.
      - name: Upload rendered book (PDF + HTML site)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: book
          path: _book/
          if-no-files-found: warn
