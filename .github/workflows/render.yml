name: Render Private Book

on:
  push:
    branches: [book]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install TinyTeX
        run: quarto install tinytex --no-prompt

      - name: Render Quarto book (HTML + PDF)
        run: quarto render

      # Rendered output (_book/) is gitignored, so publish it as a downloadable
      # artifact instead of committing it back. Runs even on failure so partial
      # output is available for debugging.
      - name: Upload rendered book (PDF + HTML site)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: book
          path: _book/
          if-no-files-found: warn
