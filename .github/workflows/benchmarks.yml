name: Daily benchmark validation

# Runs the durable paper/reference validation suite (benchmarks/run_benchmarks.py)
# once a day, with the full reference toolchain provisioned so the LIVE
# cross-checks actually execute instead of self-skipping.
#
# The reference dependencies do not all coexist in one environment, so the work
# is split across several jobs:
#
#   suite                    -- mlsynth[all] (the design/SCIP + bayes/JAX extras,
#                               which need numpy>=2 / pandas>=3) plus the R
#                               reference stack. The R-backed live cross-checks
#                               (Synth, augsynth, pensynth, MSCMT, orthsc, ...)
#                               run here; git-based references self-clone on demand.
#                               Sharded across parallel jobs + R packages cached
#                               (see the suite job's own note).
#   python-refs-relax        -- kneed / toolz / scmrelax.
#   python-refs-spsydid      -- libpysal only (kept apart from scmrelax/mosek).
#   validation-dashboard     -- generate a per-case comparison.csv for any new
#                               comparison() case, rebuild the public
#                               docs/validation.rst dashboard, and commit both
#                               back to main (guarded; commits only when changed).
#
# The two python-refs jobs use Python references that pull numpy<2 (incompatible
# with the JAX backend in `suite`), so they run WITHOUT the bayes extra, against
# only the cases that call them live. Why two and not one: see the note above
# those jobs.
#
# A numerical FAIL fails the job (run_benchmarks.py exits non-zero); a graceful
# SKIP (missing optional toolchain) does not. Reference provisioning is
# best-effort: a reference that fails to build leaves its case skipping, which is
# logged but never reds the run -- only a real regression does.

on:
  schedule:
    # 07:00 UTC = 02:00 EST. GitHub cron is UTC-only and does NOT observe
    # daylight saving, so this fires at 02:00 Eastern in winter (EST) and 03:00
    # Eastern in summer (EDT). Runs every day regardless of whether code changed.
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

# One benchmark run at a time; let an in-flight run finish rather than cancel it.
concurrency:
  group: benchmarks
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"
  PYTHONWARNINGS: "ignore"
  MPLBACKEND: "Agg"          # headless matplotlib

jobs:
  # ---------------------------------------------------------------------------
  # Main suite: mlsynth[all] + the R reference stack. Runs every registered case;
  # the R-backed live cross-checks execute because R is provisioned here.
  #
  # SHARDED: the live-reference run is the slow part, so it is split round-robin
  # across NUM_SHARDS parallel jobs (run_benchmarks.py --shard i --num-shards N).
  # Each shard runs ~1/N of the cases, keeping every shard well under the
  # timeout. To change the shard count, edit BOTH the matrix list and NUM_SHARDS.
  #
  # R CACHE: the CRAN references (requirements.R -> Synth/synthdid/did + their
  # dependencies -- the heaviest compiles) install into a user-writable
  # R_LIBS_USER that is cached across runs. requirements.R self-skips packages
  # already present, so the cache is a pure speed-up with no risk of silently
  # skipping a cross-check. The commit-pinned GitHub leaves still compile each
  # run (best-effort, into the system library).
  # ---------------------------------------------------------------------------
  suite:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    env:
      NUM_SHARDS: "4"
      R_LIBS_USER: ${{ github.workspace }}/.rlibs
      # Pin BLAS/LAPACK to a single thread so the numerically-sensitive cases
      # reproduce deterministically. constraints.txt already fixes the
      # numpy/scipy wheel versions (hence the bundled OpenBLAS build), so the
      # only remaining source of run-to-run drift is thread-scheduling races in
      # multi-threaded OpenBLAS reductions -- these perturb floating-point
      # rounding enough to push a non-convex optimiser (notably sparse_sc's
      # covariate/V-weight search) into a different local optimum, which is what
      # made sparse_sc_prop99 flake in CI while passing on the pinned local
      # stack. Single-threaded BLAS removes the race; a local single-thread run
      # matched the validated multi-thread result to 4 decimals. This is a
      # determinism patch, not a real fix: covariate selection in sparse_sc is
      # BLAS-sensitive at this scale and deserves a more stable solver someday.
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install mlsynth + optional backends (design + bayes)
        run: |
          python -m pip install --upgrade pip
          # Pin the numerically-sensitive stack (numpy/scipy/clarabel) so the
          # paper-anchored replication cases reproduce identically day to day;
          # see benchmarks/constraints.txt. Applied to this job only -- the
          # python-refs jobs deliberately resolve numpy<2 for their references.
          pip install -e '.[all]' -c benchmarks/constraints.txt

      - name: Install R
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            r-base r-base-dev build-essential cmake gfortran

      - name: Cache CRAN reference packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: rlibs-${{ runner.os }}-R-${{ hashFiles('benchmarks/R/requirements.R') }}

      # The CRAN references install into the cached user library (requirements.R
      # self-skips those already restored). The commit-pinned GitHub leaves are
      # best-effort: a build that fails leaves its cross-check skipping, surfaced
      # in the log, without failing the job. The benchmark run itself is the gate.
      - name: Provision R reference toolchain
        run: |
          set -x
          mkdir -p "$R_LIBS_USER"
          # The install_*.sh provisioners run under sudo and some (orthsc, propsdid)
          # create benchmarks/reference/.cache/... as root. Create the shared cache
          # dir as the runner up front and hand it back afterwards, so the non-root
          # benchmark run can clone the remaining references into it.
          mkdir -p benchmarks/reference/.cache
          Rscript benchmarks/R/requirements.R || echo "::warning::requirements.R partial"
          for s in benchmarks/R/install_*.sh; do
            echo "::group::$s"
            sudo bash "$s" || echo "::warning::provisioner failed: $s (its cross-check will skip)"
            echo "::endgroup::"
          done
          sudo chown -R "$(id -u):$(id -g)" benchmarks/reference/.cache

      - name: Run benchmark suite shard (live references)
        run: |
          python -u benchmarks/run_benchmarks.py --all --with-reference --report \
            --shard "${{ matrix.shard }}" --num-shards "${NUM_SHARDS}"

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report-shard-${{ matrix.shard }}
          path: |
            benchmarks/REPORT.md
            benchmarks/report.json
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Python reference cross-checks. These packages pull numpy<2 (incompatible with
  # the JAX backend in `suite`), so they get clean environments WITHOUT the bayes
  # extra and run only the cases that call them live. They are split into two jobs
  # by one dependency conflict:
  #
  # spsydid_state_mc must be kept AWAY from scmrelax: scmrelax drags in the mosek
  # Python package, and the spsydid reference calls cvxpy's `problem.solve()` with
  # no solver, so cvxpy auto-selects MOSEK and dies on its missing license. With no
  # mosek in the env, cvxpy falls back to CLARABEL and the case passes -- so it
  # gets its own libpysal-only job (validated: passes in ~9s).
  #
  # (The Prop-99 sdid_prop99 / mcnnm_prop99 cases now read pinned synthdid / MCPanel
  # references, so they need no Python reference package and run in the main suite.)
  # ---------------------------------------------------------------------------
  python-refs-relax:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install mlsynth + relaxation/clustering references
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install kneed toolz \
            "scmrelax @ git+https://github.com/metricshilab/scmrelax" \
            || echo "::warning::a Python reference failed to install (its cross-check will skip)"

      # Each case is run individually so a regression is attributable; the loop
      # fails the job if any case fails (a SKIP -- missing ref -- is not a failure).
      - name: Run relaxation/clustering cross-checks
        run: |
          set -o pipefail
          rc=0
          for c in clustersc_subgroups_ref rsc_shen_coverage rescm_relax_ref rescm_balanced_gdp; do
            echo "::group::$c"
            python -u benchmarks/run_benchmarks.py --case "$c" || rc=1
            echo "::endgroup::"
          done
          exit $rc

  # spsydid's spatial reference needs libpysal but NOT scmrelax -- isolating it
  # keeps mosek out of the env so cvxpy uses CLARABEL (see note above).
  python-refs-spsydid:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install mlsynth + libpysal (no scmrelax, so no mosek)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install libpysal \
            || echo "::warning::libpysal failed to install (the spsydid cross-check will skip)"

      - name: Run spsydid spatial cross-check
        run: |
          python -u benchmarks/run_benchmarks.py --case spsydid_state_mc

  # ---------------------------------------------------------------------------
  # Validation dashboard: create a per-case comparison.csv for every comparison()
  # case that does not yet have one, regenerate the public docs/validation.rst
  # dashboard from all committed CSVs, and commit both back to main -- the
  # out-of-band commit-back pattern of the coverage badge. Only NEW entries are
  # generated (re-running a stochastic case daily would churn Monte-Carlo jitter);
  # existing entries are preserved via their committed CSVs. Guarded so the heavy
  # [all]+R provisioning only runs when a benchmark case/reference actually
  # changed, and commits only when the page changed.
  # ---------------------------------------------------------------------------
  validation-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      R_LIBS_USER: ${{ github.workspace }}/.rlibs
      # Single-thread BLAS for reproducible comparison numbers (see suite note).
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Decide whether to run
        id: guard
        run: |
          # Run on manual dispatch, or when a benchmark case/reference changed in
          # the last ~26h (ignoring the bot's own workbook commits). Otherwise the
          # heavy provisioning below is skipped and the job is a fast no-op.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; echo "manual dispatch -> run"; exit 0
          fi
          CHANGED=$(git log --since="26 hours ago" --pretty=format:%s \
                    -- benchmarks/cases/ benchmarks/reference/ \
                    | grep -vc "validation-dashboard" || true)
          if [ "${CHANGED:-0}" -eq 0 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No benchmark case/reference changes in the last day -- skipping."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "$CHANGED benchmark change(s) since yesterday -- refreshing the dashboard."
          fi

      - name: Set up Python
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install mlsynth[all]
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[all]' -c benchmarks/constraints.txt

      - name: Install R
        if: steps.guard.outputs.run == 'true'
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            r-base r-base-dev build-essential cmake gfortran

      - name: Cache CRAN reference packages
        if: steps.guard.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: rlibs-${{ runner.os }}-R-${{ hashFiles('benchmarks/R/requirements.R') }}

      - name: Provision R reference toolchain
        if: steps.guard.outputs.run == 'true'
        run: |
          set -x
          mkdir -p "$R_LIBS_USER" benchmarks/reference/.cache
          Rscript benchmarks/R/requirements.R || echo "::warning::requirements.R partial"
          for s in benchmarks/R/install_*.sh; do
            echo "::group::$s"
            sudo bash "$s" || echo "::warning::provisioner failed: $s (its entry will skip)"
            echo "::endgroup::"
          done
          sudo chown -R "$(id -u):$(id -g)" benchmarks/reference/.cache

      - name: Create missing comparison entries + rebuild dashboard
        if: steps.guard.outputs.run == 'true'
        run: |
          # Generate a CSV for each comparison() case lacking one (references that
          # fail to provision self-skip), then regenerate the public dashboard from
          # ALL committed CSVs so no existing entry is dropped.
          python -u benchmarks/reference/export_comparison.py --missing
          python -u benchmarks/reference/build_validation.py

      - name: Commit dashboard if it changed
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/reference/*/comparison.csv docs/validation.rst
          if git diff --cached --quiet; then
            echo "Validation dashboard unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "benchmarks: refresh validation dashboard [skip ci]"
          git pull --rebase --autostash origin main
          git push
