name: Unzip and Commit

on:
  push:
    paths:
      - '*.zip'

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed root zip files
        id: zips
        run: |
          ZIPS=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^[^/]*\.zip$' || true)

          if [ -z "$ZIPS" ]; then
            echo "No root zip files changed."
            exit 0
          fi

          echo "zips<<EOF" >> $GITHUB_OUTPUT
          echo "$ZIPS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Unzip bundles
        run: |
          while IFS= read -r ZIP; do
            echo "Extracting $ZIP"
            unzip -o "$ZIP" -d .
            rm -f "$ZIP"
          done <<< "${{ steps.zips.outputs.zips }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Auto-extract uploaded zip"
          git push
