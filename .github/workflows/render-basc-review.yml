name: Render BASC West Germany review

# Renders the review Quarto document to a self-contained HTML on every push to
# the review branch, and uploads it as a downloadable workflow artifact.
on:
  push:
    branches: [claude/basc-review-westgermany]
    paths:
      - "review/basc_westgermany/**"
      - ".github/workflows/render-basc-review.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install render dependencies
        run: python -m pip install --upgrade pip jupyter pandas matplotlib

      - name: Render review
        run: quarto render review/basc_westgermany/basc_westgermany_review.qmd --to html

      - name: Upload rendered HTML
        uses: actions/upload-artifact@v4
        with:
          name: basc-westgermany-review
          path: review/basc_westgermany/basc_westgermany_review.html
          if-no-files-found: error
