project:
  type: book

# Code execution is OFF for now (eval: false): chapters render as prose, math,
# and code *listings* without running against the soon-to-be-deprecated mlsynth
# API -- so the book builds while the code layer is fixed separately. Flip eval
# back to true (or delete the line) once the chapter code is rebuilt; freeze then
# caches results so renders only re-execute changed chapters.
execute:
  eval: false
  freeze: auto

book:
  title: "Foundations of the Synthetic Control Method"
  author: "Jared Greathouse"

  chapters:
    - part: "Foundations"
      chapters:
        - index.qmd
        - math.qmd
        - averages.qmd
        # Parked (renamed to *.qmd.hold so Quarto skips it; contents preserved).
        # The mlsynth API layer is being deprecated, so the standalone
        # "Intro to mlsynth" chapter is removed from the ladder for now.
        # - mlsynthbasic.qmd

    - part: "Estimation and Inference"
      chapters:
        - poframe.qmd
        - did.qmd
        - ols.qmd
        - cvxscm.qmd

    - part: "Further Topics"
      chapters:
        - regols.qmd            # Penalized SC -- moved out of the core ladder
        # Parked for now (renamed to *.qmd.hold so Quarto skips them; contents
        # preserved -- restore by renaming back to *.qmd and re-listing here):
        # - validation.qmd      # Ch. 10 -- Validation & inference
        # - donorselect.qmd     # Ch. 11 -- Control-group selection
        # future chapters:
        # - staggered.qmd
        # - spillovers.qmd

bibliography: book.bib
csl: apa.csl

format:
  html:
    theme: clean.scss
    toc: true
    toc-depth: 2
    number-sections: true
    code-fold: true
    include-in-header:
      - text: |
          <script src="js/mathjax-macros.js"></script>
    include-after-body: 
      - js/assumptions.js
    execute:
      echo: true


  pdf:
    documentclass: book
    toc: true
    toc-depth: 2
    number-sections: true
    fontsize: 12pt
    pdf-engine: pdflatex
    keep-tex: true
    include-in-header: preamble.tex
    colorlinks: true
    linkcolor: blue
    citecolor: red
    urlcolor: magenta
    link-citations: true
    filters:
      - filters/div2thm.lua
    execute:
      echo: false
      warning: false
      error: false
      message: false

